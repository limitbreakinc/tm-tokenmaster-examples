[profile.default]
src = "src"
out = "out"
libs = ["lib"]

solc_version = "0.8.24"
evm_version = "cancun"

optimizer = true
optimizer_runs = 999_999_999

# Ignore - SPDX, Transient, Init Code Size, Selfdestruct, Deployed Code Size
ignored_error_codes = [1878, 2394, 3860, 5159, 5574] 

[fuzz]
runs = 200
max_test_rejects = 2560000

[invariant]
runs = 200
depth = 500
fail_on_revert = false